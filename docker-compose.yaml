services:
  # Banco de dados Postgres
  db:
    image: postgres:16
    container_name: edital_matcher_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    # Expondo porta 5432 para seu PC (pra debug com DBeaver por exemplo)
    ports:
      - "5432:5432"

    # Volume para persistir dados mesmo se o container reiniciar
    volumes:
      - pgdata:/var/lib/postgresql/data

    # Healthcheck garante que o banco “está pronto”
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # API FastAPI
  api:
    build: ./backend
    container_name: edital_matcher_api

    # Variáveis de ambiente para a API conectar no banco
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}

    ports:
      - "${APP_PORT}:8000"

    # Monta o código dentro do container (hot reload) + acesso ao JSON em /data
    volumes:
      - ./backend:/app
      - ./data:/data

    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: