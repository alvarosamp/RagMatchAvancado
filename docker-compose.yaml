services:

  # ── Banco de dados PostgreSQL + pgvector ──────────────────────────────────
  db:
    image: pgvector/pgvector:pg16      # imagem oficial com extensão vector incluída
    container_name: edital_matcher_db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"                    # debug com DBeaver / psql
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API FastAPI ───────────────────────────────────────────────────────────
  api:
    build: ./backend
    container_name: edital_matcher_api
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST:     ${POSTGRES_HOST}
      POSTGRES_PORT:     ${POSTGRES_PORT}
      OLLAMA_HOST:       http://ollama:11434   # aponta pro serviço abaixo
      RUNNING_IN_DOCKER: "1"
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./backend:/app                 # hot reload
      - ./data:/data                   # all_devices.json
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started     # Ollama não tem healthcheck nativo ainda

  # ── Ollama (LLM + Embeddings local) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: edital_matcher_ollama
    ports:
      - "11434:11434"                  # acesso local para debug / Ollama UI
    volumes:
      - ollama_data:/root/.ollama      # persiste modelos baixados
    # Se tiver GPU NVIDIA, descomente:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Pull automático dos modelos na primeira execução ─────────────────────
  ollama-setup:
    image: ollama/ollama:latest
    container_name: edital_matcher_ollama_setup
    depends_on:
      - ollama
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull nomic-embed-text &&
        ollama pull phi3
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"                      # roda uma vez e sai

volumes:
  pgdata:
  ollama_data: