services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: edital_matcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/edital_matcher
      OLLAMA_HOST: http://ollama:11434
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SECRET_KEY: ${SECRET_KEY:-dev-secret-troque-em-producao}
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        ollama pull nomic-embed-text &&
        ollama pull llama3
      "
    environment:
      OLLAMA_HOST: http://ollama:11434

  mlflow:
    build: ./mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://postgres:postgres@db:5432/edital_matcher
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlruns/artifacts
    volumes:
      - mlflow_data:/mlruns
    command: >
      mlflow server
        --backend-store-uri postgresql://postgres:postgres@db:5432/edital_matcher
        --default-artifact-root /mlruns/artifacts
        --host 0.0.0.0
        --port 5000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  ollama_data:
  mlflow_data: