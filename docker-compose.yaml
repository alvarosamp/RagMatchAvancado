# =============================================================================
# docker-compose.yaml — versão atualizada com serviços MLOps
# =============================================================================
#
# NOVOS SERVIÇOS ADICIONADOS:
#   - mlflow:   servidor de experiment tracking (http://localhost:5000)
#   - prefect:  servidor de orquestração — COMENTADO (ativar na próxima etapa)
#
# SERVIÇOS EXISTENTES (mantidos):
#   - db, api, ollama, ollama-setup
#
# =============================================================================

services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: edital_matcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/edital_matcher
      OLLAMA_HOST: http://ollama:11434
      MLFLOW_TRACKING_URI: http://mlflow:5000    # ← NOVO
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started               # ← NOVO
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        ollama pull nomic-embed-text &&
        ollama pull llama3
      "
    environment:
      OLLAMA_HOST: http://ollama:11434

  # ── MLflow Tracking Server ────────────────────────────────────────────────
  # CONCEITO: backend store = PostgreSQL já existente (sem nova infra)
  # Acesse a UI em: http://localhost:5000
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://postgres:postgres@db:5432/edital_matcher
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlruns/artifacts
    volumes:
      - mlflow_data:/mlruns
    command: >
      mlflow server
        --backend-store-uri postgresql://postgres:postgres@db:5432/edital_matcher
        --default-artifact-root /mlruns/artifacts
        --host 0.0.0.0
        --port 5000
    depends_on:
      db:
        condition: service_healthy

  # ── Prefect (COMENTADO — ativar na etapa do Job Orchestrator) ─────────────
  # prefect:
  #   image: prefecthq/prefect:2-latest
  #   ports:
  #     - "4200:4200"
